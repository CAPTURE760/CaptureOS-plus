services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: captureos
      POSTGRES_PASSWORD: captureos
      POSTGRES_DB: captureos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U captureos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://captureos:captureos@db:5432/captureos
      APP_NAME: CaptureOS
      # 开发环境保持调试模式（方便调试）
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8001"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # 开发环境使用 --reload（方便开发）
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
