services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: captureos
      POSTGRES_PASSWORD: captureos
      POSTGRES_DB: captureos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U captureos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: capture760/captureos-backend:latest
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://captureos:captureos@db:5432/captureos
      APP_NAME: CaptureOS
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8001"]'
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: capture760/captureos-frontend:latest
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001/api
    depends_on:
      - backend

volumes:
  postgres_data:
