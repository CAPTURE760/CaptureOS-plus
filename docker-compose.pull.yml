services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: captureos
      POSTGRES_PASSWORD: captureos
      POSTGRES_DB: captureos
    # 生产环境不暴露数据库端口（仅内部访问）
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U captureos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: crpi-d5nm65il20pptret.cn-hangzhou.personal.cr.aliyuncs.com/captureos/captureos-backend:${BACKEND_TAG:-latest}
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://captureos:captureos@db:5432/captureos
      APP_NAME: CaptureOS
      # 生产环境关闭调试模式
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8001"]'
    depends_on:
      db:
        condition: service_healthy
    # 生产环境不使用 --reload（性能和安全考虑）
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    # 添加重启策略
    restart: unless-stopped
    # 添加资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  frontend:
    image: crpi-d5nm65il20pptret.cn-hangzhou.personal.cr.aliyuncs.com/captureos/captureos-frontend:${FRONTEND_TAG:-latest}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001/api
    depends_on:
      - backend
    # 添加重启策略
    restart: unless-stopped
    # 添加资源限制
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  postgres_data:
